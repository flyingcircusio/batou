# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

exclude: ./appenv.py

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
        exclude: |
          (?x)^(
            src/batou/insecure-private.key|
            src/batou/secrets/tests/fixture/age/id_ed25519|
            examples/sensitive-values/ssh-keys/client_ed25519|
            examples/sensitive-values/ssh-keys/host_ed25519|
            examples/sensitive-values/ssh-keys/host_rsa|
            examples/sensitive-values/secrets.cfg.age.clear
          )$
      - id: check-added-large-files
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: |
          (?x)^(examples/.*/secret.*)$
      - id: check-yaml
      - id: check-json
      - id: check-toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uv run --with ty ty check src/ stubs/ examples/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
